<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-S...HASH..." crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>



    <style>
        /* Sistem Dasar & Background */
        body {
            background-color: #f0f4f8;
            /* Background utama sesuai request */
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-wrapper {
            background-color: #f0f4f8;
            min-height: 100vh;
        }

        /* Typography & Efek Neon Silver */
        .text-glow,
        .btn-outline-secondary:hover,
        .btn-outline-secondary:focus {
            /* Efek menyala putih perak/silver neon */
            color: #ffffff !important;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(200, 200, 200, 0.5),
                0 0 30px rgba(255, 255, 255, 0.2);
            font-weight: bold;
        }

        /* .btn-outline-secondary:hover,
        .btn-outline-secondary:focus {
            color: #ffffff !important;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(200, 200, 200, 0.5),
                0 0 30px rgba(255, 255, 255, 0.2);
        } */

        .glow-separator {
            height: 2px;
            background: linear-gradient(to right, transparent, #bdc3c7, transparent);
            box-shadow: 0 0 12px rgba(189, 195, 199, 0.6);
            border-radius: 50%;
            margin: 20px 0 20px 0;
            opacity: 0.7;
        }

        /* Komponen Kartu Film (Movie Card) */
        .row#movie-list {
            display: flex;
            flex-wrap: wrap;
        }

        .card {
            height: 100%;
            display: flex;
            flex-direction: column;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            /* Penting agar isi tidak keluar radius */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #ffffff;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }

        .card-body {
            flex-grow: 1;
            /* Memastikan body mengambil sisa ruang */
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
        }

        /* Poster & Content Warning (Anti-Bocor) */
        .poster-container {
            position: relative;
            height: 450px;
            /* Tinggi seragam untuk semua poster */
            width: 100%;
            background-color: #000;
            overflow: hidden;
            /* KUNCI UTAMA: Menahan overlay agar tidak bocor ke teks */
        }

        .card-img-top {
            height: 100%;
            width: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        /* Efek Blur untuk konten bermasalah */
        .filter-blur {
            filter: blur(15px);
            transform: scale(1.1);
            /* Zoom dikit agar pinggiran tidak putih */
        }

        /* Overlay Peringatan ala TikTok/Legal Site */
        .content-warning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            /* Hitam pekat transparan */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 5;
        }

        /* Animasi & Elemen Tambahan */
        .bi-exclamation-triangle-fill {
            color: #ff4d4d;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Tombol Details agar selalu di bawah kartu */
        .mt-auto-btn {
            margin-top: auto;
        }

        /* Menghindari gambar error terlihat berantakan */
        img {
            font-size: 12px;
            color: #6666;
            background-color: #e9ecef;
        }

        .mb-4 img {
            background-color: transparent !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body>
